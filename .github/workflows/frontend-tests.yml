name: Frontend CI
on:
  push:
    paths: ['frontend/**']
  pull_request:
    paths: ['frontend/**']

permissions:
  contents: read
  statuses: write

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test
        env:
          NODE_ENV: test
          NEXT_PUBLIC_API_URL: "http://localhost:5000"

      - name: Build Check
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:5000"

      - name: Notify Vercel
        if: always() 
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: 'Frontend Tests'